<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Tech Store | Security Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--black:#0a0a0a;
--dark:#111;
--purple:#8a2be2;
--glow:#b266ff;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--black);color:white;overflow-x:hidden;position:relative;}

canvas#matrix{
position:fixed;
top:0;left:0;width:100%;height:100%;z-index:-1;
}

/* NAV */
nav{
display:flex;justify-content:space-between;align-items:center;
padding:20px 8%;background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
position:fixed;width:100%;z-index:1000;
}

.logo{font-family:'Orbitron';color:var(--purple);font-size:22px;}

nav ul{display:flex;gap:25px;list-style:none;}
nav a{color:white;text-decoration:none;transition:.3s;}
nav a:hover{color:var(--purple);}

.cart-icon{
cursor:pointer;
font-size:20px;
position:relative;
}

#cartCount{
background:var(--purple);
padding:2px 7px;
border-radius:50%;
font-size:12px;
position:absolute;
top:-8px;
right:-12px;
}

/* HERO */
.hero{
height:100vh;
display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;padding-top:60px;
}

.hero h1{
font-family:'Orbitron';
font-size:55px;
color:var(--glow);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px var(--purple);}
to{text-shadow:0 0 30px var(--glow);}
}

.btn{
margin-top:15px;
padding:10px 22px;
background:var(--purple);
border:none;border-radius:6px;
color:white;cursor:pointer;
transition:.3s;
}

.btn:hover{
background:var(--glow);
transform:scale(1.05);
}

section{padding:100px 8%;}
.section-title{
font-family:'Orbitron';
color:var(--purple);
text-align:center;
margin-bottom:60px;
font-size:36px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:#121212;
padding:20px;
border-radius:10px;
transition:.4s;
border:1px solid #222;
position:relative;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px var(--purple);
}

.image{
height:180px;
background:#1e1e1e;
border-radius:8px;
margin-bottom:15px;
}

.price{
font-size:18px;
color:var(--glow);
margin:10px 0;
font-weight:bold;
}

/* CART PANEL */
#cart{
position:fixed;
right:-400px;
top:0;
width:350px;
height:100%;
background:#0f0f0f;
padding:25px;
transition:.4s;
z-index:2000;
overflow-y:auto;
box-shadow:-5px 0 25px rgba(138,43,226,0.3);
}

#cart.active{right:0;}

.cart-item{
margin-bottom:15px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.cart-item input{
width:50px;
background:#222;
border:none;
color:white;
padding:4px;
border-radius:4px;
}

.remove{
color:red;
cursor:pointer;
font-size:13px;
}

footer{
text-align:center;
padding:30px;
background:#111;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav>
<div class="logo">CYBER TECH</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#products">Products</a></li>
</ul>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cartCount">0</span>
</div>
</nav>

<div class="hero">
<h1>Cyber Tech Store</h1>
<p>Professional penetration testing tools.</p>
<button class="btn" onclick="document.getElementById('products').scrollIntoView()">Explore Tools</button>
</div>

<section id="products">
<h2 class="section-title">Our Tools</h2>

<div class="grid">

<div class="card" data-name="Tool Name 1" data-price="500">
<div class="image"></div>
<h3>Tool Name 1</h3>
<p>Description of tool 1.</p>
<div class="price">500 EGP</div>
<button class="btn add-to-cart">Add To Cart</button>
</div>

<div class="card" data-name="Tool Name 2" data-price="800">
<div class="image"></div>
<h3>Tool Name 2</h3>
<p>Description of tool 2.</p>
<div class="price">800 EGP</div>
<button class="btn add-to-cart">Add To Cart</button>
</div>

<div class="card" data-name="Tool Name 3" data-price="1200">
<div class="image"></div>
<h3>Tool Name 3</h3>
<p>Description of tool 3.</p>
<div class="price">1200 EGP</div>
<button class="btn add-to-cart">Add To Cart</button>
</div>

</div>
</section>

<!-- CART -->
<div id="cart">
<h2 style="color:var(--glow);margin-bottom:20px;">Your Cart</h2>
<div id="cartItems"></div>
<h3 id="cartTotal">Total: 0 EGP</h3>
<button class="btn" onclick="sendWhatsApp()">Send Invoice via WhatsApp</button>
</div>

<footer>
© 2026 Cyber Tech Store
</footer>

<script>
/* MATRIX EFFECT */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let letters="01".split("");
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];
for(let x=0;x<columns;x++)drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#8a2be2";
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
}
requestAnimationFrame(draw);
}
draw();

/* CART SYSTEM */
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

document.querySelectorAll(".add-to-cart").forEach(btn=>{
btn.addEventListener("click",function(){
let card=this.closest(".card");
let name=card.dataset.name;
let price=parseFloat(card.dataset.price);
let existing=cart.find(item=>item.name===name);
if(existing){existing.quantity++;}
else{cart.push({name,price,quantity:1});}
saveCart();
});
});

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
let cartItems=document.getElementById("cartItems");
cartItems.innerHTML="";
let total=0;
let count=0;

cart.forEach((item,index)=>{
total+=item.price*item.quantity;
count+=item.quantity;
cartItems.innerHTML+=`
<div class="cart-item">
<strong>${item.name}</strong><br>
${item.price} EGP × 
<input type="number" min="1" value="${item.quantity}" onchange="changeQty(${index},this.value)">
<br>
<span class="remove" onclick="removeItem(${index})">Remove</span>
</div>`;
});

document.getElementById("cartTotal").innerText="Total: "+total+" EGP";
document.getElementById("cartCount").innerText=count;
}

function changeQty(index,value){
cart[index].quantity=parseInt(value);
saveCart();
}

function removeItem(index){
cart.splice(index,1);
saveCart();
}

function sendWhatsApp(){
if(cart.length===0){alert("Cart is empty");return;}
let message="Hello, I want to order:%0A";
let total=0;
cart.forEach(item=>{
message+=`${item.name} - ${item.quantity} x ${item.price} EGP%0A`;
total+=item.price*item.quantity;
});
message+=`Total: ${total} EGP`;
window.open(`https://wa.me/201288833842?text=${message}`,"_blank");
}

updateCart();
</script>

</body>
</html>
