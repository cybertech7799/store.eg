<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Tech Store | Professional Security Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg-dark: #050505;
--card-bg: #121212;
--primary: #8a2be2;
--primary-glow: #b266ff;
--text-main: #ffffff;
--text-muted: #a0a0a0;
--border: #2a2a2a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior: smooth;
}

body{
background:var(--bg-dark);
color:var(--text-main);
overflow-x:hidden;
}

/* --- MATRIX BACKGROUND --- */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
opacity: 0.4; /* Slightly dimmed to make text readable */
}

/* --- NAVIGATION --- */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
backdrop-filter: blur(15px);
background:rgba(5, 5, 5, 0.7);
border-bottom: 1px solid rgba(138, 43, 226, 0.2);
position:fixed;
width:100%;
z-index:1000;
transition: 0.3s;
}

.logo{
font-family:'Orbitron';
color:var(--primary);
font-size:24px;
font-weight: 700;
letter-spacing: 1px;
text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
color:var(--text-main);
text-decoration:none;
font-weight: 500;
transition: 0.3s;
position: relative;
}

nav a:hover{
color:var(--primary-glow);
}

nav a::after{
content:'';
position:absolute;
width:0;
height:2px;
bottom:-5px;
left:0;
background:var(--primary);
transition: 0.3s;
}

nav a:hover::after{
width:100%;
}

#cartIcon{
cursor:pointer;
font-size:24px;
position:relative;
transition: transform 0.2s;
}

#cartIcon:hover{
transform: scale(1.1);
}

#cartCount{
position:absolute;
top:-8px;
right:-10px;
background:var(--primary);
border-radius:50%;
padding:2px 6px;
font-size:11px;
font-weight:bold;
box-shadow: 0 0 10px var(--primary);
}

/* --- HERO SECTION --- */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding: 0 20px;
position: relative;
}

.hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 90%);
    pointer-events: none;
}

.hero h1{
font-family:'Orbitron';
font-size:60px;
background: linear-gradient(to right, #fff, var(--primary-glow));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 20px;
line-height: 1.2;
}

.hero p{
margin-top:15px;
max-width:600px;
opacity:0.9;
font-size: 18px;
margin-bottom: 30px;
}

.btn{
padding:12px 30px;
background:linear-gradient(45deg, var(--primary), #6a1b9a);
border:none;
border-radius:30px;
color:white;
cursor:pointer;
text-decoration:none;
font-weight: 600;
transition: 0.3s;
box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
}

.btn:hover{
transform: translateY(-3px);
box-shadow: 0 0 25px rgba(138, 43, 226, 0.6);
}

/* --- PRODUCTS SECTION --- */
section{
padding:100px 8%;
}

.section-title{
font-family:'Orbitron';
color:var(--primary);
text-align:center;
margin-bottom:50px;
font-size:32px;
text-transform: uppercase;
letter-spacing: 2px;
}

.search-box{
text-align:center;
margin-bottom:50px;
}

.search-box input{
width:100%;
max-width:400px;
padding:12px 20px;
border-radius:30px;
border:1px solid var(--border);
background:rgba(20, 20, 20, 0.8);
color:white;
font-size:16px;
outline:none;
transition: 0.3s;
box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

.search-box input:focus{
border-color: var(--primary);
box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:var(--card-bg);
border:1px solid var(--border);
padding:20px;
border-radius:15px;
transition:0.3s;
cursor:pointer;
position: relative;
overflow: hidden;
}

.card:hover{
transform:translateY(-10px);
border-color: var(--primary);
box-shadow:0 0 30px rgba(138,43,226,0.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
transition: 0.3s;
}

.card:hover img{
transform: scale(1.05);
}

.card h3{
font-size:18px;
margin-bottom:5px;
color:white;
}

.card .stock{
font-size:13px;
color:var(--text-muted);
margin-bottom:10px;
display: block;
}

.card .desc{
font-size:14px;
color:#ccc;
margin-bottom:15px;
line-height: 1.5;
}

.card .price-row{
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 15px;
}

.price{
color:var(--primary-glow);
font-weight: bold;
font-size: 18px;
}

.add-btn{
background:transparent;
border:1px solid var(--primary);
color:white;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
transition: 0.3s;
font-size: 14px;
}

.add-btn:hover{
background:var(--primary);
box-shadow: 0 0 10px var(--primary);
}

/* --- PRODUCT PAGE --- */
#productPage{
display:none;
padding:150px 8% 100px;
text-align:center;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
}

#productPage img{
width:100%;
max-width:400px;
border-radius:15px;
margin-bottom:30px;
box-shadow: 0 0 30px rgba(138, 43, 226, 0.2);
border: 1px solid var(--border);
}

#pName{
color:var(--primary);
font-family:'Orbitron';
font-size:36px;
margin-bottom: 10px;
}

#pDesc{
max-width:700px;
margin: 0 auto 20px;
line-height: 1.6;
color: #ddd;
}

#pPrice{
font-size:28px;
color:white;
margin-bottom: 30px;
}

/* --- DISCLAIMER & CONTACT --- */
.products-disclaimer {
margin-top:80px;
padding:30px;
background:linear-gradient(145deg, #111, #151515);
border:1px solid var(--border);
border-radius:15px;
text-align:center;
color:#aaa;
font-size:14px;
max-width:800px;
margin-left:auto;
margin-right:auto;
line-height:1.6;
}

.contact-box{
margin-top:60px;
background:linear-gradient(145deg, #111, #151515);
border:1px solid var(--border);
padding:30px;
border-radius:15px;
text-align:center;
max-width:500px;
margin-left:auto;
margin-right:auto;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.contact-box h3{
color:var(--primary);
font-family:'Orbitron';
margin-bottom:20px;
}

.contact-box p{
margin-bottom:10px;
font-size: 16px;
}

/* --- CART PAGE --- */
#cartPage{
display:none;
padding:150px 8% 100px;
background: rgba(0,0,0,0.5);
backdrop-filter: blur(10px);
}

.cart-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
padding:20px;
background:var(--card-bg);
border-radius:10px;
border:1px solid var(--border);
flex-wrap:wrap;
gap: 10px;
}

.qty-controls button{
background: #222;
border: 1px solid #444;
color: white;
width: 30px;
height: 30px;
border-radius: 5px;
cursor: pointer;
}

.qty-controls span{
margin: 0 10px;
font-weight: bold;
}

#cartTotal{
margin-top: 30px;
text-align: right;
font-size: 20px;
background: var(--card-bg);
padding: 20px;
border-radius: 10px;
border: 1px solid var(--border);
}

#cartTotal div{
margin-bottom: 5px;
}

#cartTotal .final-price{
color: var(--primary-glow);
font-size: 24px;
font-weight: bold;
border-top: 1px solid #333;
padding-top: 10px;
margin-top: 10px;
}

/* --- NOTIFICATION --- */
#notification{
position:fixed;
bottom:30px;
right:-400px;
background:linear-gradient(45deg,#8a2be2,#6a1b9a);
padding:15px 25px;
border-radius:10px;
font-weight:bold;
box-shadow:0 0 20px rgba(178,102,255,0.6);
transition:0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
z-index:9999;
border: 1px solid rgba(255,255,255,0.2);
}

#notification.show{
right:30px;
}

/* --- FOOTER --- */
footer{
text-align:center;
padding:30px;
background:#080808;
border-top: 1px solid #222;
color: #666;
font-size: 14px;
}

/* --- RESPONSIVE --- */
@media (max-width: 768px) {
    .hero h1 { font-size: 36px; }
    nav { padding: 15px 5%; }
    nav ul { display: none; } /* Simplified for mobile */
    section { padding: 80px 5%; }
    .cart-row { flex-direction: column; text-align: center; }
    .cart-row div { margin-bottom: 5px; }
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<nav>
<div class="logo">CYBER TECH</div>

<ul>
<li><a href="#" onclick="showHome()">Home</a></li>
<li><a href="#products" onclick="showHome()">Products</a></li>
</ul>

<div id="cartIcon">🛒 <span id="cartCount">0</span></div>

</nav>

<div id="homePage">

<div class="hero">
<h1>Next Gen Security Tools</h1>
<p>Professional penetration testing and digital security equipment for researchers and enthusiasts.</p>
<a href="#products" class="btn">Explore Tools</a>
</div>

<section id="products">

<h2 class="section-title">Our Inventory</h2>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search for Flipper, ESP32, NFC...">
</div>

<div class="grid" id="productGrid"></div>
