<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Tech Store</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--black:#0a0a0a;
--purple:#8a2be2;
--glow:#b266ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--black);
color:white;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,0.6);
position:fixed;
width:100%;
z-index:1000;
backdrop-filter:blur(10px);
}

.logo{
font-family:'Orbitron';
color:var(--purple);
font-size:22px;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

#cartIcon{
cursor:pointer;
font-size:22px;
position:relative;
}

#cartCount{
position:absolute;
top:-10px;
right:-15px;
background:var(--purple);
border-radius:50%;
padding:2px 7px;
font-size:12px;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-family:'Orbitron';
font-size:55px;
color:var(--glow);
}

.hero p{
margin-top:15px;
max-width:600px;
opacity:0.8;
}

.btn{
margin-top:15px;
padding:10px 20px;
background:var(--purple);
border:none;
border-radius:6px;
color:white;
cursor:pointer;
text-decoration:none;
}

/* FILTER */

.filters{
text-align:center;
margin-bottom:30px;
}

.filters button{
margin:5px;
padding:8px 14px;
border:none;
background:#222;
color:white;
border-radius:6px;
cursor:pointer;
}

/* PRODUCTS */

section{
padding:100px 8%;
}

.section-title{
font-family:'Orbitron';
color:var(--purple);
text-align:center;
margin-bottom:40px;
font-size:36px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:#121212;
padding:15px;
border-radius:10px;
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px var(--purple);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:var(--purple);
padding:4px 8px;
font-size:11px;
border-radius:4px;
}

.rating{
color:gold;
font-size:14px;
margin-bottom:6px;
}

.stock-low{
color:#ff4d4d;
font-size:13px;
}

footer{
text-align:center;
padding:30px;
background:#111;
margin-top:50px;
}

</style>
</head>

<body>

<nav>

<div class="logo">CYBER TECH</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#products">Products</a></li>
</ul>

<div id="cartIcon">
🛒 <span id="cartCount">0</span>
</div>

</nav>

<div class="hero">

<h1>Cyber Tech Store</h1>

<p>Professional penetration testing and IoT hardware tools.</p>

<a href="#products" class="btn">Explore Tools</a>

</div>

<section id="products">

<h2 class="section-title">Our Tools</h2>

<div class="filters">

<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('iot')">IoT</button>
<button onclick="filterProducts('rf')">RF</button>
<button onclick="filterProducts('modules')">Modules</button>

</div>

<div class="grid" id="productGrid"></div>

</section>

<footer>
© 2026 Cyber Tech Store
</footer>

<script>

const products=[

{
name:"Flipper Zero",
price:24999,
stock:6,
category:"rf",
rating:5,
badge:"Best Seller",
image:"https://image2url.com/r2/default/images/1772738184200-4f09180b-546f-47ae-94bd-4b7ba162f724.jpeg"
},

{
name:"NRF24L01",
price:250,
stock:53,
category:"modules",
rating:4,
badge:"New",
image:"https://image2url.com/r2/default/images/1772738244772-7ffeab84-7355-40f7-b459-8d528dec2b95.jpeg"
},

{
name:"ESP32 Bruce CYD24",
price:1199,
stock:10,
category:"iot",
rating:4,
badge:"",
image:"https://image2url.com/r2/default/images/1772738204799-bf642669-610a-4d4c-8e96-9858acbfa383.jpeg"
},

{
name:"Mobile IR Remote",
price:299,
stock:20,
category:"iot",
rating:4,
badge:"",
image:"https://image2url.com/r2/default/images/1772738156638-ca629519-0d80-4bb7-9a8e-6d6abeea3f92.jpeg"
}

]

let cart=[]

const grid=document.getElementById("productGrid")

function renderProducts(list){

grid.innerHTML=""

list.forEach((p,i)=>{

let stars=""

for(let s=0;s<p.rating;s++){
stars+="⭐"
}

let stockWarn=""

if(p.stock<=5){
stockWarn=`<div class="stock-low">⚠ Only ${p.stock} left</div>`
}

grid.innerHTML+=`

<div class="card">

${p.badge?`<span class="badge">${p.badge}</span>`:""}

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="rating">${stars}</div>

${stockWarn}

<p style="color:#b266ff;font-weight:bold;">
${p.price} EGP
</p>

<button class="btn" onclick="addCart(${i})">
Add To Cart
</button>

</div>

`

})

}

function filterProducts(cat){

if(cat==="all"){
renderProducts(products)
return
}

let filtered=products.filter(p=>p.category===cat)

renderProducts(filtered)

}

function addCart(i){

let p=products[i]

let item=cart.find(x=>x.name==p.name)

if(item){

item.qty++

}else{

cart.push({name:p.name,price:p.price,qty:1})

}

updateCart()

}

function updateCart(){

let count=0

cart.forEach(i=>count+=i.qty)

document.getElementById("cartCount").innerText=count

}

renderProducts(products)

</script>

</body>
</html>
