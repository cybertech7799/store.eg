<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Tech Store | Security Tools</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
--black:#0a0a0a;
--dark:#111;
--purple:#8a2be2;
--glow:#b266ff;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--black);color:white;overflow-x:hidden;position:relative;}

canvas#matrix{
position:fixed;
top:0;left:0;width:100%;height:100%;z-index:-1;
}

/* NAV */
nav{
display:flex;justify-content:space-between;align-items:center;
padding:20px 8%;background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
position:fixed;width:100%;z-index:1000;
}
.logo{font-family:'Orbitron';color:var(--purple);font-size:22px;}
nav ul{display:flex;gap:25px;list-style:none;}
nav a{color:white;text-decoration:none;transition:.3s;}
nav a:hover{color:var(--purple);}

#cartIcon{cursor:pointer;position:relative;font-size:22px;}
#cartCount{
position:absolute;top:-10px;right:-15px;
background:var(--purple);border-radius:50%;
padding:2px 7px;font-size:12px;
}

/* SEARCH */
.search-box{
text-align:center;
margin-bottom:40px;
}
.search-box input{
width:300px;
padding:10px;
border-radius:6px;
border:1px solid #333;
background:#111;
color:white;
}

/* HERO */
.hero{
height:100vh;display:flex;justify-content:center;align-items:center;
flex-direction:column;text-align:center;padding-top:60px;
}
.hero h1{
font-family:'Orbitron';font-size:55px;color:var(--glow);
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px var(--purple);}
to{text-shadow:0 0 30px var(--glow);}
}
.hero p{margin-top:20px;max-width:600px;opacity:0.8;font-size:18px;}

.btn{
margin-top:15px;padding:10px 20px;
background:var(--purple);border:none;
border-radius:6px;color:white;
cursor:pointer;transition:.3s;
text-decoration:none;display:inline-block;
}
.btn:hover{background:var(--glow);transform:scale(1.05);}

section{padding:100px 8%;}
.section-title{
font-family:'Orbitron';color:var(--purple);
text-align:center;margin-bottom:60px;font-size:36px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}
.card{
background:#121212;
padding:20px;
border-radius:10px;
transition:.4s;
border:1px solid #222;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px var(--purple);
}
.image{
height:180px;background:#1e1e1e;
border-radius:8px;margin-bottom:15px;
}

/* CART PAGE */
#cartPage{
display:none;
padding:120px 8%;
min-height:100vh;
background:#0a0a0a;
}

.cart-item-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.qty-controls{
display:flex;
align-items:center;
gap:10px;
}
.qty-btn{
background:#333;
color:white;
border:none;
width:25px;height:25px;
border-radius:4px;
cursor:pointer;
}
.qty-btn:hover{background:var(--purple);}

/* Notification */
#notify{
position:fixed;
bottom:30px;
right:30px;
background:var(--purple);
padding:15px 20px;
border-radius:8px;
display:none;
}

footer{text-align:center;padding:30px;background:#111;opacity:0.9;}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<nav>
<div class="logo">CYBER TECH</div>
<ul>
<li><a href="#" onclick="showHome()">Home</a></li>
<li><a href="#products" onclick="showHome()">Products</a></li>
</ul>
<div id="cartIcon">🛒 <span id="cartCount">0</span></div>
</nav>

<div id="homePage">

<div class="hero">
<h1>Cyber Tech Store</h1>
<p>Professional penetration testing and digital security tools built for advanced operators.</p>
<a href="#products" class="btn">Explore Tools</a>
</div>

<section id="products">
<h2 class="section-title">Our Tools</h2>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search product by name...">
</div>

<div class="grid" id="productGrid">

<script>
for(let i=1;i<=8;i++){
document.write(`
<div class="card" data-name="Tool Name ${i}" data-price="${100+i*50}">
<div class="image"></div>
<h3>Tool Name ${i}</h3>
<p>Description of tool ${i}.</p>
<p style="color:#b266ff;font-weight:bold;">${100+i*50} EGP</p>
<button class="btn addToCart">Add To Cart</button>
</div>
`);
}
</script>

</div>
</section>
</div>

<!-- CART PAGE -->
<div id="cartPage">
<h2 class="section-title">Your Cart</h2>
<div id="cartItems"></div>
<h3 id="cartTotal"></h3>
<button onclick="showHome()" class="btn">Back To Store</button>
</div>

<div id="notify"></div>

<footer>
©️ 2026 Cyber Tech Store | All Rights Reserved
</footer>

<script>
// MATRIX
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let letters="01".split("");
let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];
for(let x=0;x<columns;x++)drops[x]=1;
function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#8a2be2";
ctx.font=fontSize+"px monospace";
for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);
if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)drops[i]=0;
drops[i]++;
}
requestAnimationFrame(draw);
}
draw();

// PAGES
const homePage=document.getElementById("homePage");
const cartPage=document.getElementById("cartPage");

function showCart(){
homePage.style.display="none";
cartPage.style.display="block";
updateCart();
}

function showHome(){
cartPage.style.display="none";
homePage.style.display="block";
}

document.getElementById("cartIcon").onclick=showCart;

// CART
let cart=JSON.parse(localStorage.getItem("cart"))||[];
const cartItems=document.getElementById("cartItems");
const cartTotal=document.getElementById("cartTotal");
const cartCount=document.getElementById("cartCount");
const notify=document.getElementById("notify");

document.addEventListener("click",function(e){
if(e.target.classList.contains("addToCart")){
let card=e.target.closest(".card");
let name=card.dataset.name;
let price=parseFloat(card.dataset.price);
let existing=cart.find(i=>i.name===name);
if(existing){existing.quantity++;}
else{cart.push({name,price,quantity:1});}
saveCart();
showNotification(name+" added to cart");
}
});

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
cartItems.innerHTML="";
let total=0,count=0;

cart.forEach((item,i)=>{
let itemTotal=item.price*item.quantity;
total+=itemTotal;
count+=item.quantity;

cartItems.innerHTML+=`
<div class="cart-item-row">
<div>
<strong>${item.name}</strong><br>
<small>${item.price} EGP</small>
</div>

<div class="qty-controls">
<button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
<span>${item.quantity}</span>
<button class="qty-btn" onclick="changeQty(${i},1)">+</button>
</div>

<div style="font-weight:bold;color:#b266ff;">
${itemTotal} EGP
</div>
</div>
`;
});

cartTotal.innerText="Total: "+total+" EGP";
cartCount.innerText=count;
}

function changeQty(i,val){
cart[i].quantity+=val;
if(cart[i].quantity<=0)cart.splice(i,1);
saveCart();
}

function showNotification(text){
notify.innerText=text;
notify.style.display="block";
setTimeout(()=>{notify.style.display="none";},2000);
}

updateCart();

// SEARCH
document.getElementById("searchInput").addEventListener("keyup",function(){
let value=this.value.toLowerCase();
document.querySelectorAll(".card").forEach(card=>{
let name=card.dataset.name.toLowerCase();
card.style.display=name.includes(value)?"block":"none";
});
});
</script>

</body>
</html>
